name: CI

on:
  push:
  pull_request:

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow

      - name: Compile backend modules
        run: python -m py_compile backend/*.py

      - name: Run backend tests
        run: python tests/test_backend.py

      - name: Run repo asset tests
        run: python tests/test_repo_assets.py

  frontend-syntax:
    name: Frontend Syntax
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check frontend extension syntax
        run: |
          node --check --input-type=module < web/comfy_pencil_extension.js
          node --check --input-type=module < web/studio/studio-app.js
          node --check --input-type=module < web/studio/project-file.js
