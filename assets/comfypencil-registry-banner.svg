<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" role="img" aria-labelledby="title desc">
  <title id="title">ComfyPencil registry banner</title>
  <desc id="desc">Registry banner showing the ComfyPencil studio, split preview, and material map workflow outputs.</desc>
