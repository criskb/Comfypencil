  <rect x="356" y="150" width="94" height="118" rx="16" fill="#0d131d" stroke="#39557f" stroke-width="2"/>
  <rect x="372" y="170" width="62" height="62" rx="12" fill="#f2efe8"/>
  <path d="M382 204C394 189 406 188 418 198C431 209 442 208 454 197" fill="none" stroke="#4f93ff" stroke-width="5" stroke-linecap="round"/>
