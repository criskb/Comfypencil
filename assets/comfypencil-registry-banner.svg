    <rect x="620" y="166" width="88" height="24" rx="12" fill="#243247"/>
    <text x="664" y="182" text-anchor="middle" fill="#dce7f9">MASK</text>
    <rect x="524" y="198" width="88" height="24" rx="12" fill="#243247"/>
    <text x="568" y="214" text-anchor="middle" fill="#dce7f9">HEIGHT</text>
    <rect x="620" y="198" width="88" height="24" rx="12" fill="#243247"/>
